# Quick run configuration - minimal settings for fast testing
seed: 42
episode_num: 5
is_train: &is_train_anchor yes

hold_start_time: 0
hold_end_time: 21600
episode_duration: 21600

# Fleet size control (optional)
# fleet_size: maximum buses on route at any time (omit or null for unlimited)
# dispatch_headway: minimum time between dispatches in seconds (omit to use route's schedule_headway)
# warm_up: whether to warm up the environment by pre-distributing buses along the route
fleet_size: 17
warm_up: no

env_name: 'cd_route_3'
has_schedule: yes

metric_names:
  - 'headway_std'
  - 'schedule_deviation'
  - 'hold_time'
  - 'pax_boarding_rejection'


wandb_config:
  is_record_wandb: No
  wandb_project_name: 'quick_test'

# running_agent: 'Simple_Control_Nonlinear'
running_agent: 'Do_Nothing'
# running_agent: 'Naive_DDPG'


agent_config:
  'Do_Nothing':
    agent_name: 'Do_Nothing'

  'Simple_Control_Nonlinear':
    agent_name: 'Simple_Control_Nonlinear'
    fs:
      f0: 0.2
      f1: 0
    slack: 10
    base_type: 'arrival'
    episode_num_for_stabilize_average_hold: 5
    episode_duration_for_stabilize_average_hold: 10800

  'Forward_Headway_Control':
    agent_name: 'Forward_Headway_Control'
    alpha: 0.4
    slack: 30
    base_type: 'rtd'
    is_nonlinear: yes
    episode_num_for_stabilize_average_hold: 10
    episode_duration_for_stabilize_average_hold: 10800

  'Naive_DDPG':
    agent_name: 'Naive_DDPG'
    is_train: *is_train_anchor
    max_hold_time: 160
    state_size: 1
    hidden_size: [64, ]
    actor_lr: 0.0003
    critic_lr: 0.001
    gamma: 0.95
    polya: 0.99
    memory_size: 50000
    update_cycle: 10
    batch_size: 512
    learning_starts: 2000
    init_noise_level: 0.25
    decay_rate: 0.98
    min_noise: 0.05
    grad_clip: 1.0
    schedule_headway: 300
    use_action_penalty: no
    w: 0.03
    reward_clip: 2.0
    state_clip: 3.0

  'Schedule_Aware_DDPG':
    agent_name: 'Schedule_Aware_DDPG'
    is_train: *is_train_anchor
    state_size: 6
    hidden_size: [256, 128]
    max_hold_time: 60
    schedule_headway: 300
    w_epsilon: 0.5
    w_spacing: 0.1
    w_action: 0.01
    reward_baseline: 0.1
    reward_clip: 2.0
    memory_size: 50000
    actor_lr: 0.0001
    critic_lr: 0.0003
    lr_decay: 0.995
    gamma: 0.90
    polya: 0.99
    update_cycle: 5
    batch_size: 256
    grad_clip: 0.5
    policy_delay: 2
    target_noise: 0.2
    noise_clip: 0.5
    init_noise_level: 0.3
    decay_rate: 0.95
    min_noise: 0.02
    use_reward_normalization: yes
    base_type: 'arrival'
    slack: 10
    episode_num_for_stabilize_average_hold: 3
    episode_duration_for_stabilize_average_hold: 10800
    epsilon_scale: 100.0
    spacing_scale: 1000.0
